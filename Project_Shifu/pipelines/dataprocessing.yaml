pipeline:
  name: Data Processing CI
  identifier: data_processing_ci
  projectIdentifier: Project_Shifu
  orgIdentifier: default
  description: |
    Generic ML dataset CI pipeline. Validates, compiles, stores and tags dataset artefacts produced from repos based on the data-template. Active research domains: LLM context optimisation, size/inference optimisation, VLM training.
  tags:
    type: data-pipeline
    domain: ml-research
  variables:
    - name: RESEARCH_DOMAIN
      type: String
      description: |
        Research domain this dataset belongs to. Accepted values (extend freely):
          llm-context-optimization | llm-size-inference-optimization |
          vlm-training | vlm-image-text-alignment | general
      value: llm-context-optimization
    - name: PYTHON_VERSION
      type: String
      value: "3.11"
    - name: DATASET_REPO
      type: String
      description: GitHub repo to process in org/repo format (e.g. ATARDENT/my-dataset)
      value: <+input>.allowedValues(ATARDENT/dataset-llm-context-opt,ATARDENT/dataset-llm-size-inference,ATARDENT/dataset-vlm-training,ATARDENT/dataset-vlm-alignment,ATARDENT/dataset-general)
  properties:
    ci:
      codebase:
        connectorRef: YOUR_GITHUB_CONNECTOR
        repoName: <+pipeline.variables.DATASET_REPO>
        build: <+input>
  stages:
    - stage:
        name: Validate
        identifier: validate
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  name: Setup Python
                  identifier: setup_python
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR
                    image: python:<+pipeline.variables.PYTHON_VERSION>-slim
                    shell: Sh
                    command: |
                      echo "====== Data Processing CI ======"
                      echo "Research domain : <+pipeline.variables.RESEARCH_DOMAIN>"
                      echo "Branch          : <+codebase.branch>"
                      echo "Commit          : <+codebase.commitSha>"
                      echo "Trigger         : <+pipeline.triggerType>"
                      echo "================================"
                      pip install --quiet --upgrade pip
                      pip install --quiet pyyaml jsonschema pandas pyarrow pillow requests tqdm
              - step:
                  name: Read Configuration
                  identifier: read_configuration
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR
                    image: python:<+pipeline.variables.PYTHON_VERSION>-slim
                    shell: Sh
                    command: |
                      python - <<'EOF'
                      import yaml, os

                      with open("configuration.yaml") as f:
                          cfg = yaml.safe_load(f)

                      version     = cfg.get("version", "0.0.0")
                      compile_    = str(cfg.get("compile", True)).lower()
                      dest        = cfg["output"]["destination"]
                      out_name    = cfg["output"]["name"]
                      branch      = cfg["output"].get("branch", "datasets")
                      folder_id   = cfg["output"].get("folder_id", "")
                      tag_enabled = str(cfg.get("tag", {}).get("enabled", True)).lower()
                      tag_prefix  = cfg.get("tag", {}).get("prefix", "dataset")

                      env_path = os.environ.get("HARNESS_OUTPUT_FILE", "/tmp/harness_out.env")
                      with open(env_path, "w") as out:
                          out.write(f"VERSION={version}\n")
                          out.write(f"COMPILE={compile_}\n")
                          out.write(f"DESTINATION={dest}\n")
                          out.write(f"OUTPUT_NAME={out_name}\n")
                          out.write(f"OUTPUT_BRANCH={branch}\n")
                          out.write(f"GDRIVE_FOLDER_ID={folder_id}\n")
                          out.write(f"TAG_ENABLED={tag_enabled}\n")
                          out.write(f"TAG_PREFIX={tag_prefix}\n")

                      print(f"version={version}  compile={compile_}  "
                            f"destination={dest}  tag_enabled={tag_enabled}")
                      EOF

                      source /tmp/harness_out.env
                      export VERSION COMPILE DESTINATION OUTPUT_NAME \
                             OUTPUT_BRANCH GDRIVE_FOLDER_ID TAG_ENABLED TAG_PREFIX
                    envVariables:
                      HARNESS_OUTPUT_FILE: /tmp/harness_out.env
                    outputVariables:
                      - name: VERSION
                      - name: COMPILE
                      - name: DESTINATION
                      - name: OUTPUT_NAME
                      - name: OUTPUT_BRANCH
                      - name: GDRIVE_FOLDER_ID
                      - name: TAG_ENABLED
                      - name: TAG_PREFIX
              - step:
                  name: Download Dataset
                  identifier: download_dataset
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR
                    image: python:<+pipeline.variables.PYTHON_VERSION>-slim
                    shell: Sh
                    command: |
                      echo "Checking source declaration ..."
                      python dataset/download.py || true
                      echo "Dataset directory contents:"
                      ls -lh dataset/
                    envVariables:
                      GITHUB_TOKEN: <+secrets.getValue("github_token")>
                      RESEARCH_DOMAIN: <+pipeline.variables.RESEARCH_DOMAIN>
              - step:
                  name: Pre-Validate
                  identifier: pre_validate
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR
                    image: python:<+pipeline.variables.PYTHON_VERSION>-slim
                    shell: Sh
                    command: |
                      echo "Running pre-rules/validate.py ..."
                      python pre-rules/validate.py
                      echo "Pre-validation PASSED"
                    envVariables:
                      RESEARCH_DOMAIN: <+pipeline.variables.RESEARCH_DOMAIN>
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
    - stage:
        name: Compile and Store
        identifier: compile_and_store
        type: CI
        when:
          pipelineStatus: Success
          condition: <+trigger.targetBranch> == "main" && <+pipeline.triggerType> == "WEBHOOK"
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: YOUR_K8S_CONNECTOR
              namespace: harness-ci
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  name: Install Dependencies
                  identifier: install_deps_compile
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR
                    image: python:<+pipeline.variables.PYTHON_VERSION>-slim
                    shell: Sh
                    command: |
                      pip install --quiet --upgrade pip
                      pip install --quiet pyyaml jsonschema pandas pyarrow pillow requests tqdm

                      DOMAIN="<+pipeline.variables.RESEARCH_DOMAIN>"
                      case "$DOMAIN" in
                        vlm-*|vlm_*)
                          echo "Installing VLM extras ..."
                          pip install --quiet Pillow transformers datasets
                          ;;
                        llm-context-*|llm_context_*)
                          echo "Installing LLM context-optimisation extras ..."
                          pip install --quiet tiktoken transformers datasets
                          ;;
                        llm-size-inference-*|llm_size_inference_*)
                          echo "Installing size/inference optimisation extras ..."
                          pip install --quiet optimum transformers datasets
                          ;;
                        *)
                          echo "No domain-specific extras for: $DOMAIN"
                          ;;
                      esac
              - step:
                  name: Check Compile Flag
                  identifier: check_compile_flag
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR
                    image: python:<+pipeline.variables.PYTHON_VERSION>-slim
                    shell: Sh
                    command: |
                      python - <<'EOF'
                      import yaml, sys
                      with open("configuration.yaml") as f:
                          cfg = yaml.safe_load(f)
                      if not cfg.get("compile", True):
                          print("compile: false - skipping compilation steps.")
                          sys.exit(0)
                      print("compile: true - proceeding.")
                      EOF
              - step:
                  name: Compile Dataset
                  identifier: compile_dataset
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR
                    image: python:<+pipeline.variables.PYTHON_VERSION>-slim
                    shell: Sh
                    command: |
                      echo "Running script/compile.py ..."
                      python script/compile.py
                      echo "Compilation complete"
                      ls -lh output/ 2>/dev/null || echo "(no output/ directory - check compile.py)"
                    envVariables:
                      RESEARCH_DOMAIN: <+pipeline.variables.RESEARCH_DOMAIN>
                      GITHUB_TOKEN: <+secrets.getValue("github_token")>
              - step:
                  name: Post-Validate
                  identifier: post_validate
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR
                    image: python:<+pipeline.variables.PYTHON_VERSION>-slim
                    shell: Sh
                    command: |
                      echo "Running post-rules/validate.py ..."
                      python post-rules/validate.py
                      echo "Post-validation PASSED"
                    envVariables:
                      RESEARCH_DOMAIN: <+pipeline.variables.RESEARCH_DOMAIN>
              - step:
                  name: Store Artefact
                  identifier: store_artefact
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR
                    image: python:<+pipeline.variables.PYTHON_VERSION>-slim
                    shell: Sh
                    command: |
                      python - <<'PYEOF'
                      import yaml, os, subprocess, sys

                      with open("configuration.yaml") as f:
                          cfg = yaml.safe_load(f)

                      dest     = cfg["output"]["destination"]
                      out_name = cfg["output"]["name"]
                      version  = cfg.get("version", "0.0.0")
                      domain   = os.environ.get("RESEARCH_DOMAIN", "")

                      print(f"Storing '{out_name}' v{version} to {dest}  [domain: {domain}]")

                      if dest == "github":
                          branch = cfg["output"].get("branch", "datasets")
                          token  = os.environ["GITHUB_TOKEN"]
                          repo   = os.environ.get("GITHUB_REPOSITORY", "")

                          subprocess.run(["git", "config", "user.email", "ci@harness.io"], check=True)
                          subprocess.run(["git", "config", "user.name",  "Harness CI"],    check=True)
                          remote = f"https://x-access-token:{token}@github.com/{repo}.git"
                          subprocess.run(["git", "remote", "set-url", "origin", remote],   check=True)

                          result = subprocess.run(
                              ["git", "ls-remote", "--heads", "origin", branch],
                              capture_output=True, text=True)
                          if branch in result.stdout:
                              subprocess.run(["git", "fetch",    "origin", branch], check=True)
                              subprocess.run(["git", "checkout", branch],           check=True)
                          else:
                              subprocess.run(["git", "checkout", "--orphan", branch], check=True)
                              subprocess.run(["git", "rm", "-rf", "."],               check=True)

                          import shutil
                          if os.path.exists("output"):
                              shutil.copytree("output", out_name, dirs_exist_ok=True)
                          else:
                              print("WARNING: no output/ directory found", file=sys.stderr)

                          subprocess.run(["git", "add", "."], check=True)
                          subprocess.run(["git", "commit", "-m",
                                          f"chore(data): store {out_name} v{version} [domain: {domain}]"],
                                         check=True)
                          subprocess.run(["git", "push", "origin", branch], check=True)
                          print(f"Pushed to branch '{branch}'")

                      elif dest == "gdrive":
                          folder_id = cfg["output"].get("folder_id", "")
                          if not folder_id:
                              print("ERROR: folder_id is empty for gdrive destination", file=sys.stderr)
                              sys.exit(1)

                          import tempfile
                          creds_json = os.environ.get("GDRIVE_CREDENTIALS", "{}")
                          with tempfile.NamedTemporaryFile("w", suffix=".json", delete=False) as tmp:
                              tmp.write(creds_json)
                              creds_path = tmp.name

                          subprocess.run(["pip", "install", "--quiet",
                                          "google-api-python-client", "google-auth"], check=True)

                          from googleapiclient.discovery import build
                          from google.oauth2 import service_account
                          from googleapiclient.http import MediaFileUpload
                          import glob

                          creds   = service_account.Credentials.from_service_account_file(
                                        creds_path,
                                        scopes=["https://www.googleapis.com/auth/drive"])
                          service = build("drive", "v3", credentials=creds)

                          for fp in glob.glob("output/**/*", recursive=True):
                              if os.path.isfile(fp):
                                  meta  = {"name": os.path.basename(fp), "parents": [folder_id]}
                                  media = MediaFileUpload(fp, resumable=True)
                                  service.files().create(body=meta, media_body=media,
                                                         fields="id").execute()
                                  print(f"Uploaded {fp}")
                      else:
                          print(f"ERROR: unknown destination '{dest}'", file=sys.stderr)
                          sys.exit(1)
                      PYEOF
                    envVariables:
                      GITHUB_TOKEN: <+secrets.getValue("github_token")>
                      GDRIVE_CREDENTIALS: <+secrets.getValue("gdrive_credentials")>
                      GITHUB_REPOSITORY: <+codebase.repoUrl>
                      RESEARCH_DOMAIN: <+pipeline.variables.RESEARCH_DOMAIN>
              - step:
                  name: Tag Release
                  identifier: tag_release
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR
                    image: python:<+pipeline.variables.PYTHON_VERSION>-slim
                    shell: Sh
                    command: |
                      python - <<'PYEOF'
                      import yaml, os, subprocess, sys

                      with open("configuration.yaml") as f:
                          cfg = yaml.safe_load(f)

                      tag_cfg     = cfg.get("tag", {})
                      tag_enabled = tag_cfg.get("enabled", True)

                      if not tag_enabled:
                          print("Tagging disabled in configuration.yaml - skipping.")
                          sys.exit(0)

                      prefix  = tag_cfg.get("prefix", "dataset")
                      version = cfg.get("version", "0.0.0")
                      tag     = f"{prefix}-v{version}"
                      token   = os.environ["GITHUB_TOKEN"]
                      repo    = os.environ.get("GITHUB_REPOSITORY", "")
                      domain  = os.environ.get("RESEARCH_DOMAIN", "")

                      subprocess.run(["git", "config", "user.email", "ci@harness.io"], check=True)
                      subprocess.run(["git", "config", "user.name",  "Harness CI"],    check=True)
                      remote = f"https://x-access-token:{token}@github.com/{repo}.git"
                      subprocess.run(["git", "remote", "set-url", "origin", remote],   check=True)

                      result = subprocess.run(
                          ["git", "ls-remote", "--tags", "origin", tag],
                          capture_output=True, text=True)
                      if tag in result.stdout:
                          print(f"Tag '{tag}' already exists - skipping.")
                          sys.exit(0)

                      subprocess.run(["git", "checkout", "main"], check=True)
                      subprocess.run(["git", "tag", "-a", tag, "-m",
                                      f"Dataset release {tag} [domain: {domain}]"],
                                     check=True)
                      subprocess.run(["git", "push", "origin", tag], check=True)
                      print(f"Tagged and pushed '{tag}'")
                      PYEOF
                    envVariables:
                      GITHUB_TOKEN: <+secrets.getValue("github_token")>
                      GITHUB_REPOSITORY: <+codebase.repoUrl>
                      RESEARCH_DOMAIN: <+pipeline.variables.RESEARCH_DOMAIN>
    - stage:
        name: Notify
        identifier: notify
        type: CI
        when:
          pipelineStatus: All
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: YOUR_K8S_CONNECTOR
              namespace: harness-ci
              os: Linux
          execution:
            steps:
              - step:
                  name: Print Summary
                  identifier: print_summary
                  type: Run
                  spec:
                    connectorRef: YOUR_DOCKER_CONNECTOR
                    image: alpine:3.19
                    shell: Sh
                    command: |
                      echo "========================================="
                      echo " Pipeline Summary"
                      echo "========================================="
                      echo "  Pipeline  : <+pipeline.name>"
                      echo "  Trigger   : <+pipeline.triggerType>"
                      echo "  Branch    : <+codebase.branch>"
                      echo "  Commit    : <+codebase.commitSha>"
                      echo "  Domain    : <+pipeline.variables.RESEARCH_DOMAIN>"
                      echo "  Exec ID   : <+pipeline.executionId>"
                      echo "========================================="
