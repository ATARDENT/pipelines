pipeline:
  name: model-ci
  identifier: model_ci
  projectIdentifier: Project_Shifu
  orgIdentifier: default
  description: |
    Generic runner for any training-template instance (v0.3.0).

    Stage shape:
      ValidateCode → ValidateDataset → parallel{Train, ApprovalGate}
                   → PersistModel    → TagVersion

    Mode A (default): trains the codebase build the user picked.
    Mode B: user supplies a JSON map of config overrides via the
    `configOverridesJson` variable. The ApplyOverrides step deep-merges
    them into manifest.yaml and commits to `auto/run-<execId>`. Training
    runs against that auto-branch commit, and the final git tag points
    at it — every config-modified run is permanently traceable.

    Step 6 forks on manifest.backend.primary[0].name (emitted as
    `backend_name` by ParseManifest):
      - "colab" → Step6RunTrainingColab (atardent/mlrunner-ci image)
      - anything else → Step6RunTrainingSkyPilot (skypilot image)
  properties:
    ci:
      codebase:
        connectorRef: github-connector
        repoName: <+input>
        build: <+input>
  variables:
    - name: trainingRunId
      type: String
      description: Unique ID for this run — embedded in checkpoint paths.
      value: <+pipeline.executionId>
    - name: configOverridesJson
      type: String
      description: |
        Optional. Mode B: JSON object mapping dotted manifest paths to
        new values. Example:
            {"training.max_epochs": 20,
             "training.hyperparameters.learning_rate": 0.0001,
             "dataset.deputy": "01999f0a-..."}
        Empty / "{}" → Mode A (no overrides, train as-is).
      value: <+input>.default("{}")
    - name: replaceExistingColab
      type: String
      description: |
        Colab-only. "true" replaces a running Colab server; "false"
        aborts if one already exists (default — protects long-running
        training from being silently killed).
      value: <+input>.default("false").allowedValues("false", "true")
    - name: mlpipeGitUrl
      type: String
      description: Git URL for installing mlpipe in every step. Override to test a branch.
      value: <+input>.default("git+https://github.com/<org>/mlpipe.git@v0.3.0")
  stages:
    - stage:
        name: ValidateCode
        identifier: ValidateCode
        type: CI
        spec:
          cloneCodebase: true
          delegateSelectors:
            - linux-amd64
          sharedPaths:
            - /tmp/shared
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              - step:
                  identifier: ResetWorkspace
                  name: Reset Workspace
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    command: |
                      rm -rf /tmp/shared/checkpoints \
                             /tmp/shared/splits \
                             /tmp/shared/dataset \
                             /tmp/shared/artifacts \
                             /tmp/shared/training_status.json \
                             /tmp/shared/sky_task.yaml \
                             /tmp/shared/eval_metrics.json
                      mkdir -p /tmp/shared
                      ls -la /tmp/shared
                      echo "✓ workspace cleaned"
              - step:
                  identifier: ApplyOverrides
                  name: Apply Config Overrides
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      CONFIG_OVERRIDES_JSON: <+pipeline.variables.configOverridesJson>
                      HARNESS_EXECUTION_ID: <+pipeline.executionId>
                      GH_TOKEN: <+secrets.getValue("github_pat")>
                      REPO_URL: <+codebase.repoUrl>
                      MLPIPE_GIT_URL: <+pipeline.variables.mlpipeGitUrl>
                    command: |
                      set -euo pipefail
                      rm -f /tmp/.harness_outputs.env
                      apt-get update -qq && apt-get install -y -qq git >/dev/null
                      pip install --quiet "mlpipe[ci] @ ${MLPIPE_GIT_URL}"
                      python -m mlpipe.ci.apply_overrides
                      if [ -f /tmp/.harness_outputs.env ]; then
                        set -a; . /tmp/.harness_outputs.env; set +a
                      fi
                    outputVariables:
                      - name: overrides_applied
                      - name: auto_branch
                      - name: auto_commit_sha
              - step:
                  identifier: ParseManifest
                  name: Parse Manifest
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      MLPIPE_GIT_URL: <+pipeline.variables.mlpipeGitUrl>
                    command: |
                      set -euo pipefail
                      rm -f /tmp/.harness_outputs.env
                      pip install --quiet "mlpipe[ci] @ ${MLPIPE_GIT_URL}"
                      python -m mlpipe.ci.parse_manifest
                      if [ -f /tmp/.harness_outputs.env ]; then
                        set -a; . /tmp/.harness_outputs.env; set +a
                      fi
                    outputVariables:
                      - name: manifest_version
                      - name: dataset_deputy
                      - name: backend_name
              - step:
                  identifier: ValidateScripts
                  name: Validate Scripts
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      MLPIPE_GIT_URL: <+pipeline.variables.mlpipeGitUrl>
                    command: |
                      set -euo pipefail
                      pip install --quiet "mlpipe[ci] @ ${MLPIPE_GIT_URL}" ruff
                      python -m mlpipe.cli.smoke_test --level 2
    - stage:
        name: ValidateDataset
        identifier: ValidateDataset
        type: CI
        spec:
          cloneCodebase: true
          delegateSelectors:
            - linux-amd64
          sharedPaths:
            - /tmp/shared
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              - step:
                  identifier: Step1CloneDataset
                  name: Step 1 - Clone Dataset
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      DEPUTY_UUID: <+stages.ValidateCode.spec.execution.steps.ParseManifest.output.outputVariables.dataset_deputy>
                    command: |
                      set -euo pipefail
                      rm -f /tmp/.harness_outputs.env
                      # deputy-cli ships in the org's internal index.
                      pip install --quiet deputy-cli >/dev/null 2>&1 || true
                      mkdir -p /tmp/shared/dataset/raw
                      deputy-cli pull "${DEPUTY_UUID}" --out /tmp/shared/dataset/raw
                      echo "dataset_path=/tmp/shared/dataset/raw" >> /tmp/.harness_outputs.env
                    outputVariables:
                      - name: dataset_path
              - step:
                  identifier: Step2ValidateDataset
                  name: Step 2 - Validate Dataset
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      DATASET_PATH: <+steps.Step1CloneDataset.output.outputVariables.dataset_path>
                      MLPIPE_GIT_URL: <+pipeline.variables.mlpipeGitUrl>
                    command: |
                      set -euo pipefail
                      pip install --quiet "mlpipe[ci] @ ${MLPIPE_GIT_URL}"
                      python -m mlpipe.ci.validate_dataset
              - step:
                  identifier: Step3SplitData
                  name: Step 3 - Split Data
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      DATASET_PATH: <+steps.Step1CloneDataset.output.outputVariables.dataset_path>
                      MLPIPE_GIT_URL: <+pipeline.variables.mlpipeGitUrl>
                    command: |
                      set -euo pipefail
                      rm -f /tmp/.harness_outputs.env
                      pip install --quiet "mlpipe[ci] @ ${MLPIPE_GIT_URL}"
                      python -m mlpipe.ci.run_split
                      if [ -f /tmp/.harness_outputs.env ]; then
                        set -a; . /tmp/.harness_outputs.env; set +a
                      fi
                    outputVariables:
                      - name: splits_dir
    - parallel:
        - stage:
            name: Train
            identifier: Train
            type: CI
            spec:
              cloneCodebase: true
              delegateSelectors:
                - linux-amd64
              sharedPaths:
                - /tmp/shared
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Docker
                spec: {}
              execution:
                steps:
                  - step:
                      identifier: Step5ResumeCheck
                      name: Step 5 - Resume Check
                      type: Run
                      spec:
                        connectorRef: dockerhubconnector
                        image: python:3.11-slim
                        shell: Bash
                        envVariables:
                          RUN_ID: <+pipeline.variables.trainingRunId>
                          R2_BUCKET: <+secrets.getValue("R2_BUCKET")>
                          R2_ACCOUNT_ID: <+secrets.getValue("R2_ACCOUNT_ID")>
                          R2_ACCESS_KEY_ID: <+secrets.getValue("R2_ACCESS_KEY")>
                          R2_SECRET_ACCESS_KEY: <+secrets.getValue("R2_SECRET_KEY")>
                          MLPIPE_GIT_URL: <+pipeline.variables.mlpipeGitUrl>
                        command: |
                          set -euo pipefail
                          rm -f /tmp/.harness_outputs.env
                          pip install --quiet "mlpipe[ci,r2] @ ${MLPIPE_GIT_URL}"
                          python -m mlpipe.ci.find_checkpoint
                          if [ -f /tmp/.harness_outputs.env ]; then
                            set -a; . /tmp/.harness_outputs.env; set +a
                          fi
                        outputVariables:
                          - name: resume_from
                  - step:
                      identifier: Step6RunTrainingColab
                      name: Step 6 - Run Training _ Colab
                      type: Run
                      timeout: 25h
                      when:
                        stageStatus: Success
                        condition: <+stages.ValidateCode.spec.execution.steps.ParseManifest.output.outputVariables.backend_name> == "colab"
                      spec:
                        connectorRef: dockerhubconnector
                        image: atardent/mlrunner-ci:latest
                        shell: Bash
                        envVariables:
                          SPLITS_DIR: <+stages.ValidateDataset.spec.execution.steps.Step3SplitData.output.outputVariables.splits_dir>
                          RESUME_FROM: <+steps.Step5ResumeCheck.output.outputVariables.resume_from>
                          RUN_ID: <+pipeline.variables.trainingRunId>
                          REPLACE_EXISTING: <+pipeline.variables.replaceExistingColab>
                          COLAB_CREDENTIALS_JSON: <+secrets.getValue("COLAB_CREDENTIALS_JSON")>
                          R2_BUCKET: <+secrets.getValue("R2_BUCKET")>
                          R2_ACCOUNT_ID: <+secrets.getValue("R2_ACCOUNT_ID")>
                          R2_ACCESS_KEY_ID: <+secrets.getValue("R2_ACCESS_KEY")>
                          R2_SECRET_ACCESS_KEY: <+secrets.getValue("R2_SECRET_KEY")>
                          WANDB_API_KEY: <+secrets.getValue("wandb_api_key")>
                          HARNESS_API_TOKEN: <+secrets.getValue("harness_api_token")>
                          HARNESS_EXECUTION_ID: <+pipeline.executionId>
                          HARNESS_ACCOUNT_ID: <+account.identifier>
                          HARNESS_ORG_ID: <+org.identifier>
                          HARNESS_PROJECT_ID: <+project.identifier>
                          APPROVAL_STAGE_ID: ApprovalGate
                          MLPIPE_GIT_URL: <+pipeline.variables.mlpipeGitUrl>
                        command: |
                          set -euo pipefail
                          # colab-cli credentials must be materialised before
                          # the supervisor calls it. The image ships the binary
                          # but expects creds at this path.
                          mkdir -p /root/.local/share/colab-cli
                          printf '%s' "$COLAB_CREDENTIALS_JSON" > /root/.local/share/colab-cli/credentials.json
                          pip install --quiet "mlpipe[ci,r2,colab] @ ${MLPIPE_GIT_URL}"
                          rm -f /tmp/.harness_outputs.env
                          python -m mlpipe.ci.run_training_colab
                          if [ -f /tmp/.harness_outputs.env ]; then
                            set -a; . /tmp/.harness_outputs.env; set +a
                          fi
                        outputVariables:
                          - name: training_state
                          - name: checkpoint_uri
                  - step:
                      identifier: Step6RunTrainingSkyPilot
                      name: Step 6 - Run Training _ SkyPilot
                      type: Run
                      timeout: 25h
                      when:
                        stageStatus: Success
                        condition: <+stages.ValidateCode.spec.execution.steps.ParseManifest.output.outputVariables.backend_name> != "colab"
                      spec:
                        connectorRef: dockerhubconnector
                        image: berkeleyskypilot/skypilot:latest
                        shell: Bash
                        envVariables:
                          SPLITS_DIR: <+stages.ValidateDataset.spec.execution.steps.Step3SplitData.output.outputVariables.splits_dir>
                          RESUME_FROM: <+steps.Step5ResumeCheck.output.outputVariables.resume_from>
                          RUN_ID: <+pipeline.variables.trainingRunId>
                          AWS_ACCESS_KEY_ID: <+secrets.getValue("aws_access_key")>
                          AWS_SECRET_ACCESS_KEY: <+secrets.getValue("aws_secret_key")>
                          GOOGLE_APPLICATION_CREDENTIALS_JSON: <+secrets.getValue("gcp_service_account_json")>
                          R2_BUCKET: <+secrets.getValue("R2_BUCKET")>
                          R2_ACCOUNT_ID: <+secrets.getValue("R2_ACCOUNT_ID")>
                          R2_ACCESS_KEY_ID: <+secrets.getValue("R2_ACCESS_KEY")>
                          R2_SECRET_ACCESS_KEY: <+secrets.getValue("R2_SECRET_KEY")>
                          WANDB_API_KEY: <+secrets.getValue("wandb_api_key")>
                          HARNESS_API_TOKEN: <+secrets.getValue("harness_api_token")>
                          HARNESS_EXECUTION_ID: <+pipeline.executionId>
                          HARNESS_ACCOUNT_ID: <+account.identifier>
                          HARNESS_ORG_ID: <+org.identifier>
                          HARNESS_PROJECT_ID: <+project.identifier>
                          APPROVAL_STAGE_ID: ApprovalGate
                          MLPIPE_GIT_URL: <+pipeline.variables.mlpipeGitUrl>
                        command: |
                          set -euo pipefail
                          # If GCP creds came in as JSON, materialise the file
                          # SkyPilot looks for.
                          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ]; then
                            mkdir -p /root/.config/gcloud
                            printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" \
                              > /root/.config/gcloud/application_default_credentials.json
                            export GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
                          fi
                          pip install --quiet "mlpipe[ci,r2,skypilot] @ ${MLPIPE_GIT_URL}"
                          rm -f /tmp/.harness_outputs.env
                          python -m mlpipe.ci.run_training_skypilot
                          if [ -f /tmp/.harness_outputs.env ]; then
                            set -a; . /tmp/.harness_outputs.env; set +a
                          fi
                        outputVariables:
                          - name: training_state
                          - name: checkpoint_uri
                  - step:
                      identifier: Step7ClassifyOutcome
                      name: Step 7 - Classify Outcome
                      type: Run
                      spec:
                        connectorRef: dockerhubconnector
                        image: python:3.11-slim
                        shell: Bash
                        envVariables:
                          MLPIPE_GIT_URL: <+pipeline.variables.mlpipeGitUrl>
                        command: |
                          set -euo pipefail
                          rm -f /tmp/.harness_outputs.env
                          pip install --quiet "mlpipe[ci] @ ${MLPIPE_GIT_URL}"
                          python -m mlpipe.ci.classify_outcome
                          if [ -f /tmp/.harness_outputs.env ]; then
                            set -a; . /tmp/.harness_outputs.env; set +a
                          fi
                        outputVariables:
                          - name: training_state
                          - name: checkpoint
        - stage:
            name: ApprovalGate
            identifier: ApprovalGate
            type: Approval
            spec:
              execution:
                steps:
                  - step:
                      identifier: AwaitApproval
                      name: Await Approval
                      type: HarnessApproval
                      timeout: 25h
                      spec:
                        approvalMessage: |
                          Training run `<+pipeline.variables.trainingRunId>` is in progress.

                          Approve  — interrupt training NOW, save the current checkpoint, then publish + tag.
                          Reject   — abort the run, nothing is saved or tagged.
                          No action — training continues until natural completion (this gate will auto-close).
                        includePipelineExecutionHistory: true
                        approvers:
                          userGroups:
                            - account._account_all_users
                          minimumCount: 1
                          disallowPipelineExecutor: false
                        approverInputs: []
                      failureStrategies:
                        - onFailure:
                            errors:
                              - ApprovalRejection
                              - Timeout
                            action:
                              type: MarkAsSuccess
    - stage:
        name: PersistModel
        identifier: PersistModel
        type: CI
        when:
          pipelineStatus: Success
          condition: <+stages.Train.spec.execution.steps.Step7ClassifyOutcome.output.outputVariables.training_state> != "rejected"
        spec:
          cloneCodebase: true
          delegateSelectors:
            - linux-amd64
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
          sharedPaths:
            - /tmp/shared
          execution:
            steps:
              - step:
                  identifier: Step8PersistModel
                  name: Step 8 - Persist Model
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      CHECKPOINT_URI: <+stages.Train.spec.execution.steps.Step7ClassifyOutcome.output.outputVariables.checkpoint>
                      RUN_ID: <+pipeline.variables.trainingRunId>
                      R2_ACCOUNT_ID: <+secrets.getValue("R2_ACCOUNT_ID")>
                      R2_ACCESS_KEY_ID: <+secrets.getValue("R2_ACCESS_KEY")>
                      R2_SECRET_ACCESS_KEY: <+secrets.getValue("R2_SECRET_KEY")>
                      R2_BUCKET: <+secrets.getValue("R2_BUCKET")>
                      HF_TOKEN: <+secrets.getValue("hf_token")>
                      IDRIVE_KEY: <+secrets.getValue("idrive_access_key")>
                      IDRIVE_SECRET: <+secrets.getValue("idrive_secret_key")>
                      MLPIPE_GIT_URL: <+pipeline.variables.mlpipeGitUrl>
                    command: |
                      set -euo pipefail
                      pip install --quiet "mlpipe[ci,r2,hf] @ ${MLPIPE_GIT_URL}"
                      # promote_via_local pulls CHECKPOINT_URI to a temp dir
                      # then pushes to the manifest.output destination.
                      python -c "
                      import os, json
                      from mlpipe.storage import get_store, promote_via_local
                      with open('/tmp/shared/manifest.json') as f:
                          manifest = json.load(f)
                      dest = manifest['output']['destination']
                      cfg  = manifest['output'].get('config', {}).get(dest, {})
                      src  = get_store('r2')
                      dst  = get_store(dest)
                      uri  = os.environ['CHECKPOINT_URI']
                      promote_via_local(src, dst, uri, cfg, run_id=os.environ['RUN_ID'])
                      "
    - stage:
        name: TagVersion
        identifier: TagVersion
        type: CI
        when:
          pipelineStatus: Success
          condition: <+stages.Train.spec.execution.steps.Step7ClassifyOutcome.output.outputVariables.training_state> != "rejected"
        spec:
          cloneCodebase: true
          delegateSelectors:
            - linux-amd64
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
          sharedPaths:
            - /tmp/shared
          execution:
            steps:
              - step:
                  identifier: Step9GitTag
                  name: Step 9 - Git Tag
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: alpine/git:latest
                    shell: Sh
                    envVariables:
                      GH_TOKEN: <+secrets.getValue("github_pat")>
                      MANIFEST_VERSION: <+stages.ValidateCode.spec.execution.steps.ParseManifest.output.outputVariables.manifest_version>
                      RUN_ID: <+pipeline.variables.trainingRunId>
                      REPO_URL: <+codebase.repoUrl>
                      AUTO_BRANCH: <+stages.ValidateCode.spec.execution.steps.ApplyOverrides.output.outputVariables.auto_branch>
                      AUTO_COMMIT_SHA: <+stages.ValidateCode.spec.execution.steps.ApplyOverrides.output.outputVariables.auto_commit_sha>
                      OVERRIDES_APPLIED: <+stages.ValidateCode.spec.execution.steps.ApplyOverrides.output.outputVariables.overrides_applied>
                    command: |
                      set -eu
                      TAG="model-v${MANIFEST_VERSION}-${RUN_ID}"
                      # In Mode B, tag the auto-branch commit; in Mode A,
                      # tag HEAD (the codebase build the user picked).
                      if [ "${OVERRIDES_APPLIED}" = "true" ] && [ -n "${AUTO_COMMIT_SHA}" ]; then
                        TARGET="${AUTO_COMMIT_SHA}"
                        echo "Mode B: tagging auto-branch commit ${AUTO_COMMIT_SHA} (${AUTO_BRANCH})"
                      else
                        TARGET="$(git rev-parse HEAD)"
                        echo "Mode A: tagging HEAD ${TARGET}"
                      fi
                      AUTHED_URL="$(echo "${REPO_URL}" | sed "s#https://#https://x-access-token:${GH_TOKEN}@#")"
                      git tag -a "${TAG}" "${TARGET}" -m "Run ${RUN_ID}"
                      git push "${AUTHED_URL}" "${TAG}"
                      echo "✓ tagged ${TAG} → ${TARGET}"
