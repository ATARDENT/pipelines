pipeline:
  name: model-ci
  identifier: model_ci
  projectIdentifier: Project_Shifu
  orgIdentifier: default
  description: Generic runner for any training-template instance.
  properties:
    ci:
      codebase:
        connectorRef: <+input>
        repoName: <+input>
        build: <+input>
  variables:
    - name: datasetDeputyUuid
      type: String
      description: Optional override; otherwise read from manifest.yaml
      value: <+input>.default("")
    - name: trainingRunId
      type: String
      description: Unique ID for this run — embedded in checkpoint paths
      value: <+pipeline.executionId>
    - name: approvalUserGroup
      type: String
      description: Harness user group authorised to approve interrupts
      value: <+input>.default("account.ml_reviewers")
    - name: vmPoolName
      type: String
      description: Name of the Harness VM Pool (Linux AMD64) configured on the delegate
      value: <+input>.default("linux-amd64-pool")
  stages:
    - stage:
        name: Validate
        identifier: Validate
        type: CI
        spec:
          cloneCodebase: true
          delegateSelectors:
            - linux-amd64
          sharedPaths:
            - /tmp/shared
          execution:
            steps:
              - step:
                  identifier: ParseManifest
                  name: ParseManifest
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    command: python parse_manifest.py
                    outputVariables:
                      - name: manifest_version
                      - name: dataset_deputy
              - step:
                  identifier: ValidateScriptsCompile
                  name: ValidateScriptsCompile
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    command: bash validate_scripts_compile.sh
              - step:
                  identifier: ValidateScriptsLint
                  name: ValidateScriptsLint
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    command: bash validate_scripts_lint.sh
              - step:
                  identifier: ValidateScriptsDryRun
                  name: ValidateScriptsDryRun
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    command: python validate_scripts_dry_run.py
              - step:
                  identifier: Step1CloneDataset
                  name: Step1CloneDataset
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      DEPUTY_UUID: <+steps.ParseManifest.output.outputVariables.dataset_deputy>
                      OVERRIDE_UUID: <+pipeline.variables.datasetDeputyUuid>
                    command: bash clone_dataset.sh
                    outputVariables:
                      - name: dataset_path
              - step:
                  identifier: Step2ValidateDataset
                  name: Step2ValidateDataset
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      DATASET_PATH: <+steps.Step1CloneDataset.output.outputVariables.dataset_path>
                    command: python validate_dataset.py
              - step:
                  identifier: Step3SplitData
                  name: Step3SplitData
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      DATASET_PATH: <+steps.Step1CloneDataset.output.outputVariables.dataset_path>
                    command: python run_split.py
                    outputVariables:
                      - name: splits_dir
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
    - parallel:
        - stage:
            name: Train
            identifier: Train
            type: CI
            spec:
              cloneCodebase: false
              infrastructure:
                useFromStage: Validate
              sharedPaths:
                - /shared
              execution:
                steps:
                  - step:
                      identifier: Step4ProvisionBackend
                      name: Step4ProvisionBackend
                      type: Run
                      spec:
                        connectorRef: dockerhubconnector
                        image: python:3.11-slim
                        shell: Bash
                        envVariables:
                          COLAB_EXTENSION_CLIENT_ID: <+secrets.getValue("colab_client_id")>
                          COLAB_EXTENSION_CLIENT_SECRET: <+secrets.getValue("colab_client_secret")>
                          COLAB_EXTENSION_ENVIRONMENT: <+secrets.getValue("colab_env")>
                          AWS_ACCESS_KEY_ID: <+secrets.getValue("aws_access_key")>
                          AWS_SECRET_ACCESS_KEY: <+secrets.getValue("aws_secret_key")>
                          THUNDER_API_KEY: <+secrets.getValue("thundercompute_api_key")>
                        command: python provision.py
                        outputVariables:
                          - name: instance_id
                          - name: backend
                  - step:
                      identifier: Step5ResumeCheck
                      name: Step5ResumeCheck
                      type: Run
                      spec:
                        connectorRef: dockerhubconnector
                        image: python:3.11-slim
                        shell: Bash
                        command: python find_checkpoint.py
                        outputVariables:
                          - name: resume_from
                  - step:
                      identifier: Step6Supervisor
                      name: Step6Supervisor
                      type: Run
                      timeout: 25h
                      spec:
                        connectorRef: dockerhubconnector
                        image: python:3.11-slim
                        shell: Bash
                        envVariables:
                          SPLITS_DIR: <+stages.Validate.spec.execution.steps.Step3SplitData.output.outputVariables.splits_dir>
                          RESUME_FROM: <+steps.Step5ResumeCheck.output.outputVariables.resume_from>
                          RUN_ID: <+pipeline.variables.trainingRunId>
                          WANDB_API_KEY: <+secrets.getValue("wandb_api_key")>
                          HARNESS_API_TOKEN: <+secrets.getValue("harness_api_token")>
                          HARNESS_EXECUTION_ID: <+pipeline.executionId>
                          HARNESS_ACCOUNT_ID: <+account.identifier>
                          HARNESS_ORG_ID: <+org.identifier>
                          HARNESS_PROJECT_ID: <+project.identifier>
                          APPROVAL_STAGE_ID: ApprovalGate
                        command: python train_supervisor.py
                  - step:
                      identifier: Step6ClassifyTraining
                      name: Step6ClassifyTraining
                      type: Run
                      spec:
                        connectorRef: account.dockerhub
                        image: python:3.11-slim
                        shell: Bash
                        command: python classify_outcome.py
                        outputVariables:
                          - name: training_state
                          - name: checkpoint
                  - step:
                      identifier: TeardownBackend
                      name: TeardownBackend
                      type: Run
                      spec:
                        connectorRef: account.dockerhub
                        image: python:3.11-slim
                        shell: Bash
                        command: python teardown.py
        - stage:
            name: ApprovalGate
            identifier: ApprovalGate
            type: Approval
            spec:
              execution:
                steps:
                  - step:
                      identifier: Step7AwaitApproval
                      name: Step7AwaitApproval
                      type: HarnessApproval
                      timeout: 25h
                      spec:
                        approvalMessage: |
                          Training run `<+pipeline.variables.trainingRunId>` is in progress.

                          Approve  — interrupt training NOW, save the current checkpoint, then publish + tag.
                          Reject   — abort the run, nothing is saved or tagged.
                          No action — training continues until natural completion.
                        includePipelineExecutionHistory: true
                        approvers:
                          userGroups:
                            - <+pipeline.variables.approvalUserGroup>
                          minimumCount: 1
                          disallowPipelineExecutor: false
                        approverInputs: []
                      failureStrategies:
                        - onFailure:
                            errors:
                              - ApprovalRejection
                              - Timeout
                            action:
                              type: MarkAsSuccess
    - stage:
        name: PersistModel
        identifier: PersistModel
        type: CI
        when:
          pipelineStatus: Success
          condition: <+stages.Train.spec.execution.steps.Step6ClassifyTraining.output.outputVariables.training_state> != "rejected"
        spec:
          cloneCodebase: false
          infrastructure:
            useFromStage: Validate
          sharedPaths:
            - /shared
          execution:
            steps:
              - step:
                  identifier: Step8StoreModel
                  name: Step8StoreModel
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      CHECKPOINT: <+stages.Train.spec.execution.steps.Step6ClassifyTraining.output.outputVariables.checkpoint>
                      RUN_ID: <+pipeline.variables.trainingRunId>
                      HF_TOKEN: <+secrets.getValue("hf_token")>
                      IDRIVE_KEY: <+secrets.getValue("idrive_access_key")>
                      IDRIVE_SECRET: <+secrets.getValue("idrive_secret_key")>
                    command: python store_artifact.py
    - stage:
        name: Evaluate
        identifier: Evaluate
        type: CI
        when:
          pipelineStatus: Success
          condition: |
            <+stages.Train.spec.execution.steps.Step6ClassifyTraining.output.outputVariables.training_state> == "completed"
            || <+stages.Train.spec.execution.steps.Step6ClassifyTraining.output.outputVariables.training_state> == "approved"
        spec:
          cloneCodebase: false
          infrastructure:
            useFromStage: Validate
          sharedPaths:
            - /shared
          execution:
            steps:
              - step:
                  identifier: Step9RunTest
                  name: Step9RunTest
                  type: Run
                  spec:
                    connectorRef: account.dockerhub
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      CHECKPOINT: <+stages.Train.spec.execution.steps.Step6ClassifyTraining.output.outputVariables.checkpoint>
                      SPLITS_DIR: <+stages.Validate.spec.execution.steps.Step3SplitData.output.outputVariables.splits_dir>
                    command: python run_eval.py
              - step:
                  identifier: Step10StoreResults
                  name: Step10StoreResults
                  type: Run
                  spec:
                    connectorRef: account.dockerhub
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      RUN_ID: <+pipeline.variables.trainingRunId>
                    command: python store_results.py
    - stage:
        name: TagVersion
        identifier: TagVersion
        type: CI
        when:
          pipelineStatus: Success
          condition: <+stages.Train.spec.execution.steps.Step6ClassifyTraining.output.outputVariables.training_state> != "rejected"
        spec:
          cloneCodebase: false
          infrastructure:
            useFromStage: Validate
          sharedPaths:
            - /shared
          execution:
            steps:
              - step:
                  identifier: Step11GitTag
                  name: Step11GitTag
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: alpine/git:latest
                    shell: Sh
                    envVariables:
                      GH_TOKEN: <+secrets.getValue("github_pat")>
                      MANIFEST_VERSION: <+stages.Validate.spec.execution.steps.ParseManifest.output.outputVariables.manifest_version>
                      RUN_ID: <+pipeline.variables.trainingRunId>
                      REPO_URL: <+codebase.repoUrl>
                    command: sh git_tag.sh
