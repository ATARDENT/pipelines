pipeline:
  name: data-ci
  identifier: data_ci
  projectIdentifier: Project_Shifu
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: account.github-connector
        repoName: data-pipeline
        build: <+input>
  variables:
    - name: DATASET_REPO
      type: String
      description: GitHub repo holding the dataset-template instance, e.g. your-org/instruction-tune-v1
      required: true
      value: <+input>
    - name: DATASET_BRANCH
      type: String
      description: Branch of the dataset repo to compile from
      required: true
      value: <+input>.default(main)
  stages:
    - stage:
        name: Compile
        identifier: compile
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Arm64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Setup Python environment
                  identifier: setup_env
                  spec:
                    shell: Bash
                    command: ./scripts/setup_env.sh
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Retry
                          spec:
                            retryCount: 2
                            retryIntervals:
                              - 30s
                            onRetryFailure:
                              action:
                                type: Abort
              - step:
                  type: Run
                  name: Acquire dataset
                  identifier: acquire_dataset
                  spec:
                    shell: Bash
                    envVariables:
                      DATASET_REPO: <+pipeline.variables.DATASET_REPO>
                      DATASET_BRANCH: <+pipeline.variables.DATASET_BRANCH>
                      GITHUB_TOKEN: <+secrets.getValue("account.github_token")>
                    command: ./scripts/acquire_dataset.sh
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Retry
                          spec:
                            retryCount: 2
                            retryIntervals:
                              - 30s
                            onRetryFailure:
                              action:
                                type: Abort
              - step:
                  type: Run
                  name: Pre-validate
                  identifier: pre_validate
                  spec:
                    shell: Bash
                    command: ./scripts/pre_validate.sh
              - step:
                  type: Run
                  name: Compile
                  identifier: compile
                  spec:
                    shell: Bash
                    command: ./scripts/compile_dataset.sh
              - step:
                  type: Run
                  name: Post-validate
                  identifier: post_validate
                  spec:
                    shell: Bash
                    command: ./scripts/post_validate.sh
              - step:
                  type: Run
                  name: Publish
                  identifier: publish
                  spec:
                    shell: Bash
                    envVariables:
                      GITHUB_TOKEN: <+secrets.getValue("account.github_token")>
                      HF_TOKEN: <+secrets.getValue("account.hf_token")>
                    command: ./scripts/publish.sh
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Retry
                          spec:
                            retryCount: 3
                            retryIntervals:
                              - 60s
                            onRetryFailure:
                              action:
                                type: ManualIntervention
                                spec:
                                  timeout: 2h
                                  onTimeout:
                                    action:
                                      type: Abort
              - step:
                  type: Run
                  name: Register to Deputy
                  identifier: register_deputy
                  spec:
                    shell: Bash
                    command: ./scripts/register_deputy.sh
              - step:
                  type: Run
                  name: Notify
                  identifier: notify
                  spec:
                    shell: Bash
                    command: ./scripts/notify.sh
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Ignore
              - step:
                  type: Run
                  name: Trigger training
                  identifier: trigger_training
                  spec:
                    shell: Bash
                    command: ./scripts/trigger_training.sh
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Retry
                          spec:
                            retryCount: 2
                            retryIntervals:
                              - 30s
                            onRetryFailure:
                              action:
                                type: ManualIntervention
                                spec:
                                  timeout: 2h
                                  onTimeout:
                                    action:
                                      type: Abort
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        delegateSelectors:
          - macos-arm64
