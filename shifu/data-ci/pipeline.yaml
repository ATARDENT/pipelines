pipeline:
  name: data-ci
  identifier: data_ci
  projectIdentifier: Project_Shifu
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: account.github_connector
        repoName: <+input>
        build: <+input>
  stages:
    - stage:
        name: Compile
        identifier: compile
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Arm64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              - step:
                  type: GitClone
                  name: Clone pipeline scripts
                  identifier: clone_pipeline_scripts
                  spec:
                    connectorRef: account.github_connector
                    repoName: data-ci
                    cloneDirectory: pipeline-scripts
                    build:
                      type: branch
                      spec:
                        branch: main
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Retry
                          spec:
                            retryCount: 2
                            retryIntervals:
                              - 30s
                            onRetryFailure:
                              action:
                                type: Abort
              - step:
                  type: Run
                  name: Setup Python environment
                  identifier: setup_env
                  spec:
                    shell: Bash
                    command: ./pipeline-scripts/scripts/setup_env.sh
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Retry
                          spec:
                            retryCount: 2
                            retryIntervals:
                              - 30s
                            onRetryFailure:
                              action:
                                type: Abort
              - step:
                  type: Run
                  name: Prepare dataset workspace
                  identifier: acquire_dataset
                  spec:
                    shell: Bash
                    command: ./pipeline-scripts/scripts/acquire_dataset.sh
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Retry
                          spec:
                            retryCount: 2
                            retryIntervals:
                              - 30s
                            onRetryFailure:
                              action:
                                type: Abort
              - step:
                  type: Run
                  name: Pre-validate
                  identifier: pre_validate
                  spec:
                    shell: Bash
                    command: ./pipeline-scripts/scripts/pre_validate.sh
              - step:
                  type: Run
                  name: Compile
                  identifier: compile
                  spec:
                    shell: Bash
                    command: ./pipeline-scripts/scripts/compile_dataset.sh
              - step:
                  type: Run
                  name: Post-validate
                  identifier: post_validate
                  spec:
                    shell: Bash
                    command: ./pipeline-scripts/scripts/post_validate.sh
              - step:
                  type: Run
                  name: Publish
                  identifier: publish
                  spec:
                    shell: Bash
                    envVariables:
                      GITHUB_TOKEN: <+secrets.getValue("account.github_token")>
                      HF_TOKEN: <+secrets.getValue("account.hf_token")>
                    command: ./pipeline-scripts/scripts/publish.sh
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Retry
                          spec:
                            retryCount: 3
                            retryIntervals:
                              - 60s
                            onRetryFailure:
                              action:
                                type: ManualIntervention
                                spec:
                                  timeout: 2h
                                  onTimeout:
                                    action:
                                      type: Abort
              - parallel:
                  - step:
                      type: Run
                      name: Register to Deputy
                      identifier: register_deputy
                      spec:
                        shell: Bash
                        command: ./pipeline-scripts/scripts/register_deputy.sh
                  - step:
                      type: Run
                      name: Notify
                      identifier: notify
                      spec:
                        shell: Bash
                        command: ./pipeline-scripts/scripts/notify.sh
                      failureStrategies:
                        - onFailure:
                            errors:
                              - AllErrors
                            action:
                              type: Ignore
                  - step:
                      type: Run
                      name: Trigger training
                      identifier: trigger_training
                      spec:
                        shell: Bash
                        command: ./pipeline-scripts/scripts/trigger_training.sh
                      failureStrategies:
                        - onFailure:
                            errors:
                              - AllErrors
                            action:
                              type: Retry
                              spec:
                                retryCount: 2
                                retryIntervals:
                                  - 30s
                                onRetryFailure:
                                  action:
                                    type: ManualIntervention
                                    spec:
                                      timeout: 2h
                                      onTimeout:
                                        action:
                                          type: Abort
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        delegateSelectors:
          - macos-arm64
