pipeline:
  name: model-deploy
  identifier: model_deploy
  projectIdentifier: Project_Shifu
  orgIdentifier: default
  description: |-
    Standalone deploy pipeline. Resolves a trained model by run_id (from R2 via a presigned URL, or from HuggingFace), provisions a runtime through mlrunner, and KEEPS IT ALIVE serving an HTTP endpoint (keep-up: no teardown on success). Single stage so all steps share one workspace (clone + submodule + scripts). deployTarget chooses the backend:
      cpu-ondemand -> ColabBackend, CPU-only, always-available (current default)
      gpu-spheron  -> SpheronBackend: SSH into an already-running Spheron GPU instance
  properties:
    ci:
      codebase:
        connectorRef: <+input>
        repoName: <+input>
        build: <+input>
  variables:
    - name: modelRunId
      type: String
      description: run_id of the trained model to deploy (matches models/<run_id>/ in R2).
      value: <+input>
    - name: modelSource
      type: String
      description: Where to pull the model from — "r2" (presigned, default) or "hf".
      value: <+input>.default("r2").allowedValues(r2, hf)
    - name: hfRepoId
      type: String
      description: HuggingFace repo id (org/name). Required only when modelSource == "hf".
      value: <+input>.default("")
    - name: deployTarget
      type: String
      description: cpu-ondemand = always-available Colab CPU runtime (current behaviour); gpu-spheron  = SSH into an ALREADY-RUNNING Spheron GPU instance. You must launch the instance in app.spheron.ai first and pass its IP via spheronHost. Teardown CANNOT stop the instance (the backend's teardown is a no-op) — it only kills the endpoint; stop the box yourself in the Spheron dashboard.
      value: <+input>.default("cpu-ondemand").allowedValues(cpu-ondemand, gpu-spheron)
    - name: gpuType
      type: String
      description: GPU label for gpu-spheron (e.g. H100, A100). Ignored for cpu-ondemand.
      value: <+input>.default("H100")
    - name: spheronHost
      type: String
      description: Public IP of the already-running Spheron GPU instance. REQUIRED when deployTarget == gpu-spheron; ignored otherwise.
      value: <+input>.default("")
    - name: spheronUser
      type: String
      description: SSH user for the Spheron instance (Spheron defaults to root).
      value: <+input>.default("root")
    - name: spheronHourlyRate
      type: String
      description: Optional $/hr for local (approximate) cost tracking on gpu-spheron, e.g. "1.33". "" disables cost tracking. Authoritative billing is in the dashboard.
      value: <+input>.default("")
    - name: highRam
      type: String
      description: Request high-RAM runtime (cpu-ondemand / Colab only).
      value: <+input>.default("false").allowedValues("false", "true")
    - name: replaceExisting
      type: String
      description: cpu-ondemand only. Colab allows ONE server per account, so a new endpoint can't coexist with the old one. "false" (default) PROTECTS a live endpoint — the run aborts instead of killing it. "true" tears down the existing server first, then provisions the new one (brief downtime during the swap).
      value: <+input>.default("false").allowedValues("false", "true")
    - name: approvalUserGroup
      type: String
      description: Harness user group authorised to approve teardown of the live endpoint.
      value: <+input>.default("account.ml_reviewers")
  stages:
    - stage:
        name: Deploy
        identifier: Deploy
        type: CI
        spec:
          cloneCodebase: true
          delegateSelectors:
            - linux-amd64
          execution:
            steps:
              - step:
                  identifier: InitAndTest
                  name: InitAndTest
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      GH_TOKEN: <+secrets.getValue("GITHUB_COLAB_SDK_PAT")>
                    command: |
                      set -euo pipefail
                      apt-get update -qq && apt-get install -y -qq git >/dev/null
                      # colab-sdk is a PRIVATE submodule registered with an SSH URL
                      # (git@github.com:...). Rewrite SSH + https GitHub URLs to
                      # authenticated HTTPS using the PAT. Use --add so every rewrite
                      # coexists (plain `git config` would overwrite the previous one).
                      git config --global --add url."https://${GH_TOKEN}@github.com/".insteadOf "git@github.com:"
                      git config --global --add url."https://${GH_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
                      git config --global --add url."https://${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
                      git submodule sync --recursive
                      git submodule update --init --recursive
                      pip install -e '.[dev]' -e './colab-sdk' -q
                      # Fast gate — unit + simulated, no Colab credentials touched.
                      pytest tests/ --ignore=tests/integration/test_colab_e2e.py -q
                      python main.py --infra simulated
              - step:
                  identifier: FetchModel
                  name: FetchModel
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: python:3.11-slim
                    shell: Bash
                    envVariables:
                      MODEL_RUN_ID: <+pipeline.variables.modelRunId>
                      MODEL_SOURCE: <+pipeline.variables.modelSource>
                      HF_REPO_ID: <+pipeline.variables.hfRepoId>
                      R2_ACCOUNT_ID: <+secrets.getValue("R2_ACCOUNT_ID")>
                      R2_ACCESS_KEY_ID: <+secrets.getValue("R2_ACCESS_KEY")>
                      R2_SECRET_ACCESS_KEY: <+secrets.getValue("R2_SECRET_KEY")>
                      R2_BUCKET: <+secrets.getValue("R2_BUCKET")>
                      HF_TOKEN: <+secrets.getValue("HUGGINGFACE_READ_TOKEN")>
                    command: |
                      set -euo pipefail
                      pip install boto3 huggingface_hub -q
                      # Plain assignment (not `export x=$(...)`) so set -e aborts here
                      # if fetch_model.py exits non-zero, instead of silently continuing.
                      model_url="$(python ci/fetch_model.py)"
                      if [ -z "$model_url" ]; then
                        echo "fetch_model.py produced no URL" >&2; exit 1
                      fi
                      export model_url
                      echo "Resolved model_url (run_id=${MODEL_RUN_ID:-n/a}, source=${MODEL_SOURCE:-r2})"
                    outputVariables:
                      - name: model_url
              - step:
                  identifier: ServeColab
                  name: ServeColab
                  type: Run
                  timeout: 30m
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.deployTarget> == "cpu-ondemand"
                  spec:
                    connectorRef: dockerhubconnector
                    image: atardent/mlrunner-ci:latest
                    shell: Bash
                    envVariables:
                      DEPLOY_TARGET: cpu-ondemand
                      COLAB_CREDENTIALS_JSON: <+secrets.getValue("COLAB_CREDENTIALS_JSON")>
                      MODEL_URL: <+steps.FetchModel.output.outputVariables.model_url>
                      HIGH_RAM: <+pipeline.variables.highRam>
                      RUN_ID: <+pipeline.variables.modelRunId>
                      REPLACE_EXISTING: <+pipeline.variables.replaceExisting>
                    command: |
                      set -euo pipefail
                      mkdir -p /root/.local/share/colab-cli
                      printf '%s' "$COLAB_CREDENTIALS_JSON" > /root/.local/share/colab-cli/credentials.json
                      pip install -e '.' -e './colab-sdk' -q
                      # Colab allows only ONE server per account. Never silently kill a
                      # live endpoint: abort unless the operator explicitly opts in.
                      EXISTING="$(colab-cli --quiet server ls)"
                      if [ "$EXISTING" != "no_servers" ]; then
                        if [ "${REPLACE_EXISTING:-false}" = "true" ]; then
                          echo "replaceExisting=true — removing existing server before reprovisioning."
                          colab-cli --quiet server rm || true
                        else
                          echo "ERROR: a Colab server is already assigned ('$EXISTING') and is" >&2
                          echo "likely still serving. Colab permits only one server per account," >&2
                          echo "so this run will NOT kill it or start a second one." >&2
                          echo "Options: keep using the current endpoint; re-run with" >&2
                          echo "replaceExisting=true to replace it; or run model-deploy-teardown" >&2
                          echo "(or 'colab-cli --quiet server rm' on the host) to free it." >&2
                          exit 1
                        fi
                      fi
                      python ci/serve_model.py | tee /tmp/serve.out
                      # serve_model.py prints endpoint_url/server_name on stdout, but
                      # mlrunner also writes upload chatter there (e.g. a "✓ ... → ..."
                      # line) — so source ONLY the key=value lines, not the whole stream.
                      grep -E '^(endpoint_url|server_name)=' /tmp/serve.out > /tmp/serve.env || true
                      set -a; . /tmp/serve.env; set +a
                    outputVariables:
                      - name: endpoint_url
                      - name: server_name
              - step:
                  identifier: ServeSpheron
                  name: ServeSpheron
                  type: Run
                  timeout: 30m
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.deployTarget> == "gpu-spheron"
                  spec:
                    connectorRef: dockerhubconnector
                    image: atardent/mlrunner-ci:latest
                    shell: Bash
                    envVariables:
                      DEPLOY_TARGET: gpu-spheron
                      MODEL_URL: <+steps.FetchModel.output.outputVariables.model_url>
                      GPU_TYPE: <+pipeline.variables.gpuType>
                      RUN_ID: <+pipeline.variables.modelRunId>
                      SPHERON_HOST: <+pipeline.variables.spheronHost>
                      SPHERON_USER: <+pipeline.variables.spheronUser>
                      SPHERON_HOURLY_RATE: <+pipeline.variables.spheronHourlyRate>
                      SPHERON_KEY_PATH: /root/.ssh/id_ed25519
                      SPHERON_SSH_KEY: <+secrets.getValue("SPHERON_SSH_KEY")>
                    command: |
                      set -euo pipefail
                      if [ -z "${SPHERON_HOST:-}" ]; then
                        echo "ERROR: spheronHost is empty. Launch a GPU instance at" >&2
                        echo "https://app.spheron.ai, then pass its public IP as spheronHost." >&2
                        exit 1
                      fi
                      # Materialise the SSH private key from the Harness secret. The
                      # backend's paramiko transport reads it via key_filename
                      # (SPHERON_KEY_PATH) and uses AutoAddPolicy, so there is no
                      # known_hosts / ssh-keyscan setup to do here.
                      mkdir -p /root/.ssh && chmod 700 /root/.ssh
                      printf '%s\n' "$SPHERON_SSH_KEY" > /root/.ssh/id_ed25519
                      chmod 600 /root/.ssh/id_ed25519
                      # [spheron] extra pulls paramiko; colab-sdk satisfies top-level
                      # imports in mlrunner/__init__ (submodule already inited by InitAndTest).
                      pip install -e '.[spheron]' -e './colab-sdk' -q
                      python ci/serve_model.py | tee /tmp/serve.out
                      # serve_model.py prints endpoint_url/server_name on stdout, but
                      # mlrunner also writes upload chatter there (e.g. a "✓ ... → ..."
                      # line) — so source ONLY the key=value lines, not the whole stream.
                      grep -E '^(endpoint_url|server_name)=' /tmp/serve.out > /tmp/serve.env || true
                      set -a; . /tmp/serve.env; set +a
                    outputVariables:
                      - name: endpoint_url
                      - name: server_name
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
    - stage:
        name: ApprovalGate
        identifier: ApprovalGate
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  identifier: AwaitTeardown
                  name: AwaitTeardown
                  type: HarnessApproval
                  timeout: 2h
                  spec:
                    approvalMessage: |
                      A model endpoint is now LIVE (the URL is in the ServeColab /
                      ServeSpheron step output of the Deploy stage). It serves until you
                      STOP it here.

                      Approve OR Reject — STOP the endpoint now. Both buttons do the same.
                      No action         — it is stopped automatically at the timeout.

                      NOTE for gpu-spheron: stopping kills the SERVING PROCESSES only.
                      The Spheron GPU INSTANCE keeps running and BILLING — you must stop
                      it yourself in the Spheron dashboard (https://app.spheron.ai).
                      (cpu-ondemand / Colab: the runtime is fully removed.)
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - <+pipeline.variables.approvalUserGroup>
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
                  failureStrategies:
                    - onFailure:
                        errors:
                          - ApprovalRejection
                          - Timeout
                        action:
                          type: MarkAsSuccess
    - stage:
        name: Teardown
        identifier: Teardown
        type: CI
        when:
          pipelineStatus: Success
        spec:
          cloneCodebase: false
          delegateSelectors:
            - linux-amd64
          execution:
            steps:
              - step:
                  identifier: RemoveServer
                  name: RemoveServer
                  type: Run
                  spec:
                    connectorRef: dockerhubconnector
                    image: atardent/mlrunner-ci:latest
                    shell: Bash
                    envVariables:
                      DEPLOY_TARGET: <+pipeline.variables.deployTarget>
                      COLAB_CREDENTIALS_JSON: <+secrets.getValue("COLAB_CREDENTIALS_JSON")>
                      SPHERON_HOST: <+pipeline.variables.spheronHost>
                      SPHERON_USER: <+pipeline.variables.spheronUser>
                      SPHERON_SSH_KEY: <+secrets.getValue("SPHERON_SSH_KEY")>
                    command: |
                      set -euo pipefail
                      if [ "${DEPLOY_TARGET}" = "gpu-spheron" ]; then
                        # The backend CANNOT stop a Spheron instance (teardown is a no-op).
                        # Best effort: SSH in and kill the serving processes so the public
                        # endpoint goes down. The INSTANCE keeps running until you stop it
                        # in the dashboard.
                        if [ -z "${SPHERON_HOST:-}" ]; then
                          echo "No spheronHost recorded; cannot reach the instance to stop serving." >&2
                        else
                          apt-get update -qq && apt-get install -y -qq openssh-client >/dev/null
                          mkdir -p /root/.ssh && chmod 700 /root/.ssh
                          printf '%s\n' "$SPHERON_SSH_KEY" > /root/.ssh/id_ed25519
                          chmod 600 /root/.ssh/id_ed25519
                          echo "Stopping serving processes on ${SPHERON_HOST} (endpoint goes down)..."
                          ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
                              -o ConnectTimeout=15 "${SPHERON_USER:-root}@${SPHERON_HOST}" \
                              'pkill -f cloudflared || true; pkill -f "uvicorn" || true; pkill -f "app:app" || true; echo "serving stopped"' \
                            || echo "WARN: could not reach the instance (it may already be stopped)."
                        fi
                        echo ""
                        echo "================= ACTION REQUIRED ================="
                        echo "The Spheron GPU INSTANCE (${SPHERON_HOST:-unknown}) is STILL RUNNING"
                        echo "and STILL BILLING. mlrunner cannot deallocate it from here."
                        echo "Stop it now to stop charges:  https://app.spheron.ai"
                        echo "=================================================="
                      else
                        # cpu-ondemand: Colab — this DOES fully remove the runtime.
                        mkdir -p /root/.local/share/colab-cli
                        printf '%s' "$COLAB_CREDENTIALS_JSON" > /root/.local/share/colab-cli/credentials.json
                        BEFORE="$(colab-cli --quiet server ls)"
                        echo "Current server: $BEFORE"
                        if [ "$BEFORE" = "no_servers" ]; then
                          echo "Nothing to tear down (already gone — e.g. Colab idle timeout)."
                        else
                          colab-cli --quiet server rm
                          echo "Torn down. Now: $(colab-cli --quiet server ls)"
                        fi
                      fi
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
