pipeline:
  name: pc-wakeup
  identifier: pcwakeup
  projectIdentifier: Project_Shifu
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: Wake PC via Phone
        identifier: wol_stage
        type: CI
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
        spec:
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              - stepGroup:
                  name: Setup Environment
                  identifier: setup_group
                  steps:
                    - step:
                        type: Run
                        name: Install Required Tools
                        identifier: install_tools
                        spec:
                          shell: Bash
                          command: |
                            echo "=== [SETUP] Installing SSH + Tailscale ==="

                            if ! command -v ssh >/dev/null; then
                              echo "[SETUP] Installing SSH..."
                              apt-get update && apt-get install -y openssh-client
                            else
                              echo "[SETUP] SSH already installed"
                            fi

                            if ! command -v tailscale >/dev/null; then
                              echo "[SETUP] Installing Tailscale..."
                              curl -fsSL https://tailscale.com/install.sh | sh
                            else
                              echo "[SETUP] Tailscale already installed"
                            fi
                    - step:
                        type: Run
                        name: Start - Authenticate Tailscale
                        identifier: tailscale_up
                        spec:
                          shell: Bash
                          command: |
                            echo "=== [SETUP] Starting Tailscale ==="

                            sudo tailscaled &
                            sleep 5

                            echo "[SETUP] Authenticating..."
                            sudo tailscale up --authkey=$TS_AUTHKEY

                            echo "[SETUP] Tailscale status:"
                            tailscale status
                    - step:
                        type: Run
                        name: Setup SSH Key
                        identifier: setup_ssh
                        spec:
                          shell: Bash
                          command: |
                            echo "=== [SETUP] Preparing SSH key ==="

                            mkdir -p ~/.ssh
                            chmod 700 ~/.ssh

                            if [ -z "$PEM_KEY" ]; then
                              echo "❌ PEM_KEY env variable missing"
                              exit 1
                            fi

                            echo "$PEM_KEY" > ~/.ssh/phone.pem
                            chmod 400 ~/.ssh/phone.pem

                            cat <<EOF > ~/.ssh/config
                            Host phone
                                HostName trcs-a14
                                User ardent
                                Port 8022
                                IdentityFile ~/.ssh/phone.pem
                                StrictHostKeyChecking no
                            EOF
              - stepGroup:
                  name: Pre-Check
                  identifier: precheck_group
                  steps:
                    - step:
                        type: Run
                        name: Check if nhat-hung-pc-1 is already awake
                        identifier: pre_ping
                        spec:
                          shell: Bash
                          command: |
                            echo "=== [PRECHECK] Checking device ==="

                            if tailscale ping -c 1 nhat-hung-pc-1 >/dev/null 2>&1; then
                              echo "✅ Device already awake. Exiting pipeline."
                              exit 0
                            else
                              echo "Device is offline. Proceeding to WOL..."
                            fi
              - stepGroup:
                  name: Trigger Wake-on-LAN
                  identifier: wol_group
                  steps:
                    - step:
                        type: Run
                        name: SSH to phone and send WOL
                        identifier: wol_trigger
                        spec:
                          shell: Bash
                          command: |
                            echo "=== [WOL] Sending magic packet ==="

                            ssh phone << 'EOF'
                              echo "[PHONE] Executing WOL..."
                              wol A8:A1:59:D7:40:FD
                            EOF
              - stepGroup:
                  name: Post-Check
                  identifier: postcheck_group
                  steps:
                    - step:
                        type: Run
                        name: Verify nhat-hung-pc
                        identifier: verify_pc
                        spec:
                          shell: Bash
                          command: |
                            echo "=== [POSTCHECK] Checking nhat-hung-pc ==="

                            for i in 1 2; do
                              echo "Attempt $i: waiting 60s..."
                              sleep 60

                              if tailscale ping -c 1 nhat-hung-pc >/dev/null 2>&1; then
                                echo "✅ nhat-hung-pc is awake!"
                                exit 0
                              fi
                            done

                            echo "❌ nhat-hung-pc failed to wake"
                            exit 1
                    - step:
                        type: Run
                        name: Verify nhat-hung-pc-1
                        identifier: verify_pc1
                        spec:
                          shell: Bash
                          command: |
                            echo "=== [POSTCHECK] Checking nhat-hung-pc-1 ==="

                            for i in 1 2; do
                              echo "Attempt $i: waiting 60s..."
                              sleep 60

                              if tailscale ping -c 1 nhat-hung-pc-1 >/dev/null 2>&1; then
                                echo "✅ nhat-hung-pc-1 is awake!"
                                exit 0
                              fi
                            done

                            echo "❌ nhat-hung-pc-1 failed to wake"
                            exit 1
