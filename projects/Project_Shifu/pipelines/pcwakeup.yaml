pipeline:
  name: PC Wakeup
  identifier: pcwakeup
  projectIdentifier: Project_Shifu
  orgIdentifier: default
  tags: {}
  variables:
    - name: PC_MAIN
      type: String
      value: nhat-hung-pc
    - name: PC_BACKUP
      type: String
      value: nhat-hung-pc-1
  stages:
    - stage:
        name: Wake PC via Phone
        identifier: wol_stage
        type: CI
        variables:
          - name: TS_AUTHKEY
            type: Secret
            value: TAILSCALE_AUTH_KEY
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Arm64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - stepGroup:
                  name: Install Dependencies
                  identifier: install_group
                  steps:
                    - step:
                        type: Run
                        name: Install Tailscale and Tools
                        identifier: install_tools
                        spec:
                          shell: Bash
                          command: |
                            echo "🛠️  [INSTALL] Suiting up... adding Tailscale to the guest list first"

                            # Add Tailscale apt repo — skip the install script middleman
                            curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/jammy.noarmor.gpg \
                              | sudo tee /usr/share/keyrings/tailscale-archive-keyring.gpg >/dev/null
                            curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/jammy.tailscale-keyring.list \
                              | sudo tee /etc/apt/sources.list.d/tailscale.list

                            # One update, one install — everything in a single apt transaction
                            sudo apt-get update -y -qq
                            sudo apt-get install -y -qq tailscale wakeonlan

                            echo "✅ [INSTALL] Armed and ready. Tailscale $(tailscale --version | head -1) reporting for duty."
              - stepGroup:
                  name: Setup Tailscale
                  identifier: tailscale_group
                  steps:
                    - step:
                        type: Run
                        name: Authenticate Tailscale
                        identifier: tailscale_auth
                        spec:
                          shell: Bash
                          command: |
                            echo "🔐 [TAILSCALE] Knocking on Tailscale's door..."
                            sudo tailscaled &
                            sleep 5

                            echo "[TAILSCALE] Flashing our badge..."
                            sudo tailscale up --authkey=$TS_AUTHKEY

                            echo "🌐 [TAILSCALE] We're in. Network status:"
                            tailscale status
              - stepGroup:
                  name: Pre-Check
                  identifier: precheck_group
                  steps:
                    - step:
                        type: Run
                        name: Check if PC is already awake
                        identifier: pre_ping
                        spec:
                          shell: Bash
                          command: |
                            echo "👀 [PRECHECK] Peeking to see if [PC-MAIN] is already up and about..."

                            if tailscale ping --timeout=15s $PC_MAIN >/dev/null 2>&1; then
                              echo "☕ [PRECHECK] Well well well, [PC-MAIN] is already awake and sipping coffee. Nothing to do here!"
                              echo "already_awake=true" >> $HARNESS_OUTPUT_FILE
                            else
                              echo "😴 [PRECHECK] [PC-MAIN] is deep in dreamland. Time to ring the doorbell!"
                              echo "already_awake=false" >> $HARNESS_OUTPUT_FILE
                            fi
              - stepGroup:
                  name: Send Magic Packet
                  identifier: wol_group
                  when:
                    stageStatus: Success
                    condition: <+execution.steps.precheck_group.steps.pre_ping.output.outputVariables.already_awake> == "false"
                  steps:
                    - step:
                        type: Run
                        name: SSH to phone and send WOL
                        identifier: wol_trigger
                        spec:
                          shell: Bash
                          command: |
                            echo "📱 [WOL] Calling our guy (the phone) to go knock on [PC-MAIN]'s door..."

                            # Write PEM key to disk — Secret File works with raw ssh -i
                            echo '<+secrets.getValue("ardent-phone")>' > /tmp/phone_key.pem
                            chmod 600 /tmp/phone_key.pem

                            # Sanity check
                            if [ ! -s /tmp/phone_key.pem ]; then
                              echo "💀 [WOL] PEM key is empty or missing! Check secret 'ardent-phone' exists and is in scope."
                              exit 1
                            fi

                            ssh \
                              -i /tmp/phone_key.pem \
                              -p 8022 \
                              -o StrictHostKeyChecking=no \
                              ardent@trcs-a14 \
                              'echo "[PHONE] Casting the magic spell... 🪄" && wol A8:A1:59:D7:40:FD'

                            echo "✅ [WOL] Magic packet YEETED across the network. Fingers crossed! 🤞"
              - stepGroup:
                  name: Verify PCs Online
                  identifier: verify_group
                  when:
                    stageStatus: Success
                    condition: <+execution.steps.precheck_group.steps.pre_ping.output.outputVariables.already_awake> == "false"
                  steps:
                    - step:
                        type: Run
                        name: Verify PC-MAIN is awake
                        identifier: verify_pc_main
                        spec:
                          shell: Bash
                          command: |
                            echo "🏥 [VERIFY] Checking pulse on [PC-MAIN]... (up to 2 minutes)"

                            for i in 1 2; do
                              echo "⏳ [VERIFY] Attempt $i/2 — giving [PC-MAIN] 60s to rub its eyes..."
                              sleep 60

                              if tailscale ping --timeout=5s $PC_MAIN >/dev/null 2>&1; then
                                echo "🎉 [VERIFY] [PC-MAIN] is ALIVE! It has risen!"
                                exit 0
                              fi

                              echo "😶 [VERIFY] Nothing yet. $([ $i -lt 2 ] && echo 'Trying again...' || echo 'That is all the patience we have.')"
                            done

                            echo "💀 [VERIFY] [PC-MAIN] refused to wake up after 2 minutes. Giving up."
                            exit 1
                    - step:
                        type: Run
                        name: Verify PC-BACKUP is awake
                        identifier: verify_pc_backup
                        spec:
                          shell: Bash
                          command: |
                            echo "🏥 [VERIFY] [PC-MAIN] is up! Now checking on its sibling [PC-BACKUP]..."

                            if tailscale ping --timeout=15s $PC_BACKUP >/dev/null 2>&1; then
                              echo "🎉 [VERIFY] [PC-BACKUP] was already up! Overachiever."
                              exit 0
                            fi

                            echo "😴 [VERIFY] [PC-BACKUP] still snoozing. Giving it one last 60s nap..."
                            sleep 60

                            if tailscale ping -c 1 $PC_BACKUP >/dev/null 2>&1; then
                              echo "🎉 [VERIFY] [PC-BACKUP] finally crawled out of bed. We'll take it!"
                              exit 0
                            fi

                            echo "💀 [VERIFY] [PC-BACKUP] is a deep sleeper. Failed to respond after final attempt."
                            exit 1
