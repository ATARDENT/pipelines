pipeline:
  name: pc-wakeup
  identifier: pcwakeup
  projectIdentifier: Project_Shifu
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: Wake PC via Phone
        identifier: wol_stage
        type: CI
        description: ""
        variables:
          - name: TS_AUTHKEY
            type: Secret
            value: TAILSCALE_AUTH_KEY
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Arm64
          runtime:
            type: Cloud
            spec:
              imageSpec:
                imageName: atardent/pcwakeup:latest
                connectorRef: dockerhubconnector
          execution:
            steps:
              - stepGroup:
                  name: Setup Environment
                  identifier: setup_group
                  steps:
                    - step:
                        type: Run
                        name: Start - Authenticate Tailscale
                        identifier: tailscale_up
                        spec:
                          shell: Bash
                          command: |
                            echo "=== [SETUP] Starting Tailscale ==="

                            sudo tailscaled &
                            sleep 5

                            echo "[SETUP] Authenticating..."
                            sudo tailscale up --authkey=$TS_AUTHKEY

                            echo "[SETUP] Tailscale status:"
                            tailscale status
              - stepGroup:
                  name: Pre-Check
                  identifier: precheck_group
                  steps:
                    - step:
                        type: Run
                        name: Check if nhat-hung-pc is already awake
                        identifier: pre_ping
                        spec:
                          shell: Bash
                          command: |
                            echo "=== [PRECHECK] Pinging nhat-hung-pc ==="

                            if tailscale ping -c 1 nhat-hung-pc >/dev/null 2>&1; then
                              echo "✅ nhat-hung-pc is already awake. Skipping WOL."
                              echo "already_awake=true" >> $HARNESS_OUTPUT_FILE
                            else
                              echo "💤 nhat-hung-pc is offline. Proceeding to WOL..."
                              echo "already_awake=false" >> $HARNESS_OUTPUT_FILE
                            fi
              - stepGroup:
                  name: Trigger Wake-on-LAN
                  identifier: wol_group
                  when:
                    stageStatus: Success
                    condition: <+execution.steps.precheck_group.steps.pre_ping.output.outputVariables.already_awake> == "false"
                  steps:
                    - step:
                        type: Run
                        name: SSH to phone and send WOL
                        identifier: wol_trigger
                        spec:
                          shell: Bash
                          command: |
                            echo "=== [WOL] Sending magic packet via phone ==="

                            ssh \
                              -i <+secrets.getSSHKeyPath("phone_ssh")> \
                              -p 8022 \
                              -o StrictHostKeyChecking=no \
                              ardent@trcs-a14 \
                              'echo "[PHONE] Sending WOL packet..." && wol A8:A1:59:D7:40:FD'
              - stepGroup:
                  name: Post-Check
                  identifier: postcheck_group
                  parallel: true
                  when:
                    stageStatus: Success
                    condition: <+execution.steps.precheck_group.steps.pre_ping.output.outputVariables.already_awake> == "false"
                  steps:
                    - step:
                        type: Run
                        name: Verify nhat-hung-pc
                        identifier: verify_pc
                        spec:
                          shell: Bash
                          command: |
                            echo "=== [POSTCHECK] Waiting for nhat-hung-pc ==="

                            for i in 1 2; do
                              echo "Attempt $i: waiting 60s..."
                              sleep 60

                              if tailscale ping -c 1 nhat-hung-pc >/dev/null 2>&1; then
                                echo "✅ nhat-hung-pc is awake!"
                                exit 0
                              fi
                            done

                            echo "❌ nhat-hung-pc failed to wake after 2 minutes"
                            exit 1
                    - step:
                        type: Run
                        name: Verify nhat-hung-pc-1
                        identifier: verify_pc1
                        spec:
                          shell: Bash
                          command: |
                            echo "=== [POSTCHECK] Waiting for nhat-hung-pc-1 ==="

                            for i in 1 2; do
                              echo "Attempt $i: waiting 60s..."
                              sleep 60

                              if tailscale ping -c 1 nhat-hung-pc-1 >/dev/null 2>&1; then
                                echo "✅ nhat-hung-pc-1 is awake!"
                                exit 0
                              fi
                            done

                            echo "❌ nhat-hung-pc-1 failed to wake after 2 minutes"
                            exit 1
